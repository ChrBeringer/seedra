<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seedra v1.0 - Algorithm-v1</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="glass border border-slate-700 p-6 md:p-8 rounded-[2.5rem] shadow-2xl w-full max-w-lg">
        <h1 class="text-2xl font-black mb-8 text-gradient text-center uppercase tracking-tighter">
            Seedra v1.0 - Algorithm-v1
        </h1>

        <div id="mainContainer" class="space-y-6">
            
            <div>
                <label class="block text-xs font-bold mb-2 text-slate-500 uppercase tracking-widest ml-1">1. Base Text (Seed)</label>
                <div class="flex gap-2">
                    <input type="password" id="inputText" placeholder="Dein geheimes Wort..." 
                        autocomplete="off" spellcheck="false"
                        class="flex-grow bg-slate-800 border border-slate-600 rounded-2xl px-4 py-4 focus:ring-2 focus:ring-blue-500 outline-none transition shadow-inner">
                    <button onclick="pasteFromClipboard()" class="bg-slate-700 hover:bg-slate-600 px-5 rounded-2xl border border-slate-600 transition active:scale-90 shadow-lg">📋</button>
                </div>
            </div>

            <div class="bg-slate-800/40 p-5 rounded-3xl border border-slate-700/50 shadow-inner">
                <div class="flex justify-between items-end mb-5 px-1">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">2. Passwort-Länge</label>
                    <span id="lengthDisplay" class="text-3xl font-mono font-black text-emerald-400">32</span>
                </div>

                <div class="segmented-control mb-8" id="segmentedControl">
                    <div id="indicator" class="selection-indicator"></div>
                    <button onclick="applyPreset(12)" id="btnS" class="preset-btn">S</button>
                    <button onclick="applyPreset(32)" id="btnL" class="preset-btn">L</button>
                    <button onclick="applyPreset(40)" id="btnXL" class="preset-btn">XL</button>
                </div>

                <div class="flex items-center gap-4">
                    <button onclick="stepLength(-1)" class="w-14 h-14 flex items-center justify-center bg-slate-700 hover:bg-slate-600 rounded-2xl active:scale-90 transition text-2xl font-bold shadow-lg border border-slate-600">-</button>
                    <input type="range" id="lengthSlider" min="8" max="60" value="32" class="flex-grow">
                    <button onclick="stepLength(1)" class="w-14 h-14 flex items-center justify-center bg-slate-700 hover:bg-slate-600 rounded-2xl active:scale-90 transition text-2xl font-bold shadow-lg border border-slate-600">+</button>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold mb-2 text-slate-500 uppercase tracking-widest ml-1">3. Geheim-Zusatz (Salt)</label>
                <input type="password" id="inputSalt" placeholder="Extra Sicherheitsebene..." 
                    autocomplete="off"
                    class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-4 py-4 focus:ring-2 focus:ring-blue-500 outline-none transition shadow-inner">
            </div>

            <div class="pt-4 border-t border-slate-700/50 space-y-4">
                <div id="resultDisplay" class="password-blur w-full bg-slate-950 border border-blue-500/30 rounded-[2rem] p-6 font-mono break-all text-center min-h-[110px] flex items-center justify-center text-xl tracking-widest shadow-2xl text-blue-100 cursor-pointer" title="Hover zum Anzeigen">
                    ...
                </div>
                
                <button id="copyBtn" onclick="copyToClipboard(this)" 
                    class="w-full bg-gradient-to-r from-blue-600 to-emerald-600 py-5 rounded-2xl font-black text-white shadow-[0_10px_25px_rgba(37,99,235,0.4)] active:scale-[0.98] transition-all flex justify-center items-center gap-2 uppercase tracking-widest text-sm">
                    Passwort Kopieren
                </button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="p-4 rounded-2xl bg-slate-900/80 border border-slate-800 shadow-inner">
                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-1">Standard PC</p>
                    <p id="crackTime" class="text-emerald-400 text-sm font-bold truncate">-</p>
                </div>
                <div class="p-4 rounded-2xl bg-slate-900/80 border border-slate-800 shadow-inner">
                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-1">Quantum PC</p>
                    <p id="quantumTime" class="text-blue-400 text-sm font-bold truncate">-</p>
                </div>
            </div>
        </div>
    </div>

    <script src="seedra_algorithms_v1.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Seedra PWA: Service Worker registriert (Scope: ' + reg.scope + ')'))
                    .catch(err => console.log('Seedra PWA: Registrierung fehlgeschlagen:', err));
            });
        }
    </script>
</body>
</html>
